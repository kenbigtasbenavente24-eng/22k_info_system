<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>Hello!</h1>

<!-- =====================================================
     SECTION: SELECT
     Each button calls runSelect() with:
       1. the query name from $SELECT_QUERIES in queries.php
       2. the id of the div where the table will appear
====================================================== -->
<h2>SELECT</h2>

<select id="table-select">
    <option value="customer">Customers</option>
    <option value="product">Products</option>
    <option value="supplier">Suppliers</option>
    <option value="orders">Orders</option>
    <option value="payment">Payments</option>
    <option value="deliverystock">Delivery Stock</option>
</select>

<button onclick="runSelect('get_table', 'result-container')">
    Fetch Table
</button>

<!-- Add more SELECT buttons here, following the same pattern -->

<!-- =====================================================
     SECTION: DELETE
     runDelete() takes the query name and an array of
     values for the ? placeholders in that query.
     After deleting, we re-run the SELECT to refresh the table.
====================================================== -->

<h2>DELETE</h2>

<button onclick="handleDelete()">Delete Item (id = 1)</button>

<!-- =====================================================
     SECTION: UPDATE
     runUpdate() takes the query name and an array of
     values for the ? placeholders in that query.
     Order must match the order of ? in the SQL.
====================================================== -->

<h2>UPDATE</h2>

<button onclick="handleUpdate()">Rename Item (id = 1)</button>

<!-- =====================================================
     TABLE OUTPUT
     renderTable() / runSelect() write into this div.
====================================================== -->
<div id="result-container">
    <!-- Results appear here -->
</div>

<!-- Load the shared table renderer + API helper functions -->
<script src="js/table-renderer.js"></script>

<script>
async function handleDelete() {
    // 'delete_table_item' SQL:  DELETE FROM ... WHERE id = ?
    const affected = await runDelete('delete_table_item', [1]);
    alert(`Deleted ${affected} row(s).`);
    // Refresh the table after deletion
    runSelect('get_table', 'result-container');
}

async function handleUpdate() {
    // 'update_item_name' SQL:  UPDATE ... SET name = ? WHERE id = ?
    //  params order:           [name_value,  id_value]
    const affected = await runUpdate('update_item_name', ['Updated Name', 1]);
    alert(`Updated ${affected} row(s).`);
    // Refresh the table after update
    runSelect('get_all_items', 'result-container');
}

runSelect('customer', 'result-container');
</script>

</body>
</html>
