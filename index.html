<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My App</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>
</head>
<body>

<header class="site-header">
    <div class="site-brand">
        <span class="site-title">22K Information System</span>
    </div>

    <nav class="site-nav">
        <button class="site-nav-btn active" id="navTables"  onclick="showSection('tables')">
            <i class="fa-solid fa-table"></i> Tables
        </button>
        <button class="site-nav-btn"        id="navReports" onclick="showSection('reports')">
            <i class="fa-solid fa-chart-bar"></i> Reports
        </button>
    </nav>
</header>

<div class="wrap">
      <div id="section-tables">
        <div class="page-title">
            <h2>Table Records</h2>
            <p>Displays all records from the tables relevant to your requirements.</p>
        </div>

    <!-- =====================================================
        SECTION: SELECT
        Each button calls switchTable() with:
          1. the button element itself (for active state)
          2. the query name from $SELECT_QUERIES in queries.php
        data-query stores the query name so getActiveQueryName()
        can retrieve it for post-delete/update refresh.
    ====================================================== -->

    <div class="table-nav">
        <button class="tab-btn active" data-query="customer"      onclick="switchTable(this, 'customer')">
            <i class="fa-solid fa-address-book"></i>Customer List</button>
        <button class="tab-btn"        data-query="orders"        onclick="switchTable(this, 'orders')">
            <i class="fa-solid fa-shopping-cart"></i>Orders List</button>
        <button class="tab-btn"        data-query="payment"       onclick="switchTable(this, 'payment')">
            <i class="fa-solid fa-credit-card"></i>Payment List</button>
        <button class="tab-btn"        data-query="product"       onclick="switchTable(this, 'product')">
            <i class="fa-solid fa-box-open"></i>Product Catalog</button>
        <button class="tab-btn"        data-query="supplier"      onclick="switchTable(this, 'supplier')">
            <i class="fa-solid fa-truck"></i>Suppliers</button>
        <button class="tab-btn"        data-query="deliverystock" onclick="switchTable(this, 'deliverystock')">
            <i class="fa-solid fa-warehouse"></i>Delivery Stock</button>
    </div>

    <!-- Add more SELECT buttons here, following the same pattern -->

    <!-- =====================================================
        TABLE OUTPUT
        renderTable() / runSelect() write into this div.
    ====================================================== -->

        <div id="result-container"></div>
      </div>

 <div id="section-reports" style="display:none;">
        <div class="page-title">
            <h2>Data Reports</h2>
            <p>View and export business reports as PDF.</p>
        </div>
 
        <!-- Report sub-tabs -->
        <div class="table-nav" id="report-nav">
            <button class="tab-btn active" data-report="report_customer_order_history"  onclick="switchReport(this, 'report_customer_order_history','Customer Order History')">
                <i class="fa-solid fa-history"></i>Customer Order History</button>
            <button class="tab-btn" data-report="report_order_item_breakdown" onclick="switchReport(this, 'report_order_item_breakdown','Order Item Breakdown')">
                <i class="fa-solid fa-box"></i>Order Item Breakdown</button>
            <button class="tab-btn" data-report="report_supplier_product_catalog" onclick="switchReport(this, 'report_supplier_product_catalog','Supplier Product Catalog')">
                <i class="fa-solid fa-boxes"></i>Supplier Product Catalog</button>
        </div>
 
        <div class="report-card-wrapper">
        <div class="report-header">
            <div>
                <p class="report-title" id="reportTitle">Customer Order History</p>
                <p class="report-subtitle" id="reportSubtitle">Loading...</p>
            </div>
            <button class="export-btn" onclick="exportPDF()"><i class="fa-solid fa-download"></i>Export PDF</button>
        </div>

        <div id="report-container"></div>
    </div>
</div>

    <!-- =====================================================
        MODAL: shown when the user clicks "View" on a row.
        Buttons wire up their handlers inside ViewOptions().
    ====================================================== -->

    <div id="viewModal" class="modal-backdrop" style="display: none;">
        <div class="modal-content">
            <h3 id="modalTitle">Record Options</h3>
            <hr>
            <div id="modalDetails"></div>
            <div class="modal-buttons">
                <button id="btnUpdate" class="modal-btn warning">Update Record</button>
                <button id="btnDelete" class="modal-btn danger">Delete Record</button>
                <button id="btnClose"  class="modal-btn cancel">Close</button>
            </div>
        </div>
    </div>

</div><!-- /.wrap -->

<script src="js/table-renderer.js"></script>

</body>
</html>
