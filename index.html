<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>22k Inventory Management System</h1>

<div class="wrap">

    <h1>Greetings!</h1>

    <!-- =====================================================
        SECTION: SELECT
        Each button calls switchTable() with:
          1. the button element itself (for active state)
          2. the query name from $SELECT_QUERIES in queries.php
        data-query stores the query name so getActiveQueryName()
        can retrieve it for post-delete/update refresh.
    ====================================================== -->

    <div class="table-nav">
        <button class="tab-btn active" data-query="customer"      onclick="switchTable(this, 'customer')">Customer List</button>
        <button class="tab-btn"        data-query="orders"        onclick="switchTable(this, 'orders')">Orders List</button>
        <button class="tab-btn"        data-query="payment"       onclick="switchTable(this, 'payment')">Payment List</button>
        <button class="tab-btn"        data-query="product"       onclick="switchTable(this, 'product')">Product Catalog</button>
        <button class="tab-btn"        data-query="supplier"      onclick="switchTable(this, 'supplier')">Suppliers</button>
        <button class="tab-btn"        data-query="deliverystock" onclick="switchTable(this, 'deliverystock')">Delivery Stock</button>
    </div>

    <!-- Add more SELECT buttons here, following the same pattern -->

    <!-- =====================================================
        TABLE OUTPUT
        renderTable() / runSelect() write into this div.
    ====================================================== -->

    <div id="result-container"></div>

    <!-- =====================================================
        MODAL: shown when the user clicks "View" on a row.
        Buttons wire up their handlers inside ViewOptions().
    ====================================================== -->

    <div id="viewModal" class="modal-backdrop" style="display: none;">
        <div class="modal-content">
            <h3 id="modalTitle">Record Options</h3>
            <hr>
            <div id="modalDetails"></div>
            <div class="modal-buttons">
                <button id="btnUpdate" class="modal-btn warning">Update Record</button>
                <button id="btnDelete" class="modal-btn danger">Delete Record</button>
                <button id="btnClose"  class="modal-btn cancel">Close</button>
            </div>
        </div>
    </div>

</div><!-- /.wrap -->

<script src="js/table-renderer.js"></script>

</body>
</html>
